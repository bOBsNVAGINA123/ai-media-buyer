name: AI Media Buyer — Weekly Strategic Advisor

# ── Weekly strategic brief per account. Runs on GitHub's servers. ──
# Posts to #strategic-advisor-ourkids and #strategic-advisor-playmore.
on:
  schedule:
    # Saturday 06:00 UTC = 9AM Cairo (summer). Start-of-week planning brief.
    - cron: "17 6 * * 6"
  workflow_dispatch: {}   # also triggerable by hand from the Actions tab

permissions:
  contents: write

concurrency:
  group: media-buyer-weekly
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run the weekly strategic advisor
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: python analyze.py --weekly

      - name: Alert on job failure
        if: failure()
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "{\"channel\":\"C0BFN4UGYKY\",\"text\":\":rotating_light: <@U082VCLRZ6E> AI Media Buyer weekly advisor FAILED.\\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
