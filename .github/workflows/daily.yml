name: AI Media Buyer

# ── This is the automation. GitHub runs it on their servers on a schedule. ──
# You do not run anything. Your laptop can be off. Nobody has to be online.
on:
  schedule:
    # GitHub cron is UTC only. Egypt is UTC+3, so:
    #   23:05 UTC = 02:05 Cairo the NEXT day -> the ONE daily run.
    # Everything posts here: the daily memo, the 3-day, the launch feed, and the decisions feed.
    # analyze.py adds the 7-day on Saturdays and the 30-day on the 1st, off the Cairo clock.
    # Off the :00 minute on purpose: GitHub throttles and often drops crons set to exactly :00.
    - cron: "5 23 * * *"
  workflow_dispatch:      # trigger by hand from the Actions tab
    inputs:
      windows:
        description: "Which reads to post. Blank = follow the schedule. e.g. 7day or daily,30day"
        required: false
        default: ""

permissions:
  contents: write         # so it can commit data.json + state.json back

concurrency:
  group: media-buyer
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install the chart renderer
        run: pip install --quiet matplotlib pillow

      - name: Run the media buyer
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          FORCE_WINDOWS: ${{ github.event.inputs.windows }}
          # Optional: set these two to turn on the Shopify store memo. If they are empty, the store
          # report simply does not run and the Meta reports are untouched.
          SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
          SHOPIFY_TOKEN: ${{ secrets.SHOPIFY_TOKEN }}
        run: python analyze.py --daily

      - name: Commit dashboard data + alert state
        run: |
          git config user.name "ai-media-buyer"
          git config user.email "bot@users.noreply.github.com"
          git add docs/data.json docs/state.json docs/img || true
          git commit -m "auto: update $(date -u +'%Y-%m-%d %H:%M UTC')" || echo "no changes"
          git push || echo "nothing to push"
