name: AI Media Buyer

# ── This is the automation. GitHub runs it on their servers on a schedule. ──
# You do not run anything. Your laptop can be off. Nobody has to be online.
on:
  schedule:
    # GitHub cron is UTC only. Egypt is UTC+3, so:
    #   06:17 UTC = 09:17 Cairo  -> the daily + 3 day read, and the new-launch feed
    #   23:17 UTC = 02:17 Cairo the NEXT day -> the 7 day (Saturdays) and the 30 day (1st of month)
    # analyze.py reads the Cairo clock and decides which of those it is actually writing.
    # Off the :00 minute on purpose: GitHub throttles and often drops crons set to exactly :00.
    - cron: "17 6 * * *"
    - cron: "17 23 * * *"
  workflow_dispatch:      # trigger by hand from the Actions tab
    inputs:
      windows:
        description: "Which reads to post. Blank = follow the schedule. e.g. 7day or daily,30day"
        required: false
        default: ""

permissions:
  contents: write         # so it can commit data.json + state.json back

concurrency:
  group: media-buyer
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install the chart renderer
        run: pip install --quiet matplotlib pillow

      - name: Run the media buyer
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          FORCE_WINDOWS: ${{ github.event.inputs.windows }}
        run: python analyze.py --daily

      - name: Commit dashboard data + alert state
        run: |
          git config user.name "ai-media-buyer"
          git config user.email "bot@users.noreply.github.com"
          git add docs/data.json docs/state.json docs/img || true
          git commit -m "auto: update $(date -u +'%Y-%m-%d %H:%M UTC')" || echo "no changes"
          git push || echo "nothing to push"
